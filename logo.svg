<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="68%">
      <stop offset="0%" stop-color="#201A0E"/>
      <stop offset="100%" stop-color="#0E0C07"/>
    </radialGradient>
    <linearGradient id="goldShine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5E4AE"/>
      <stop offset="45%" stop-color="#D4A72C"/>
      <stop offset="100%" stop-color="#8A6A1B"/>
    </linearGradient>
    <linearGradient id="leather" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33302B"/>
      <stop offset="55%" stop-color="#1C1A16"/>
      <stop offset="100%" stop-color="#0F0E0B"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5E4AE"/>
      <stop offset="100%" stop-color="#D9C077"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" fill="url(#bgGlow)"/>

  <!-- guilloche ring -->
  <g stroke="#F0DCA0" fill="none" opacity="0.12">
    <ellipse cx="256" cy="256" rx="228" ry="204"/>
    <ellipse cx="256" cy="256" rx="228" ry="204" transform="rotate(30 256 256)"/>
    <ellipse cx="256" cy="256" rx="228" ry="204" transform="rotate(60 256 256)"/>
    <ellipse cx="256" cy="256" rx="228" ry="204" transform="rotate(90 256 256)"/>
    <ellipse cx="256" cy="256" rx="228" ry="204" transform="rotate(120 256 256)"/>
    <ellipse cx="256" cy="256" rx="228" ry="204" transform="rotate(150 256 256)"/>
  </g>
  <circle cx="256" cy="256" r="238" fill="none" stroke="url(#goldShine)" stroke-width="4"/>
  <circle cx="256" cy="256" r="230" fill="none" stroke="#8A6A1B" stroke-width="1.5" opacity="0.7"/>

  <!-- cash stacks poking out of the open zipper (behind bag top) -->
  <g>
    <g transform="rotate(-10 216 196)">
      <rect x="188" y="168" width="58" height="40" rx="4" fill="url(#cash)"/>
      <rect x="188" y="176" width="58" height="6" fill="#C9AD5E"/>
      <rect x="205" y="168" width="22" height="40" fill="url(#goldShine)" opacity="0.9"/>
      <text x="216" y="196" text-anchor="middle" font-family="'Arial Black',sans-serif" font-size="16" font-weight="900" fill="#3A2F12">$</text>
    </g>
    <g transform="rotate(7 292 188)">
      <rect x="262" y="160" width="62" height="44" rx="4" fill="url(#cash)"/>
      <rect x="262" y="169" width="62" height="6" fill="#C9AD5E"/>
      <rect x="281" y="160" width="24" height="44" fill="url(#goldShine)" opacity="0.9"/>
      <text x="293" y="191" text-anchor="middle" font-family="'Arial Black',sans-serif" font-size="17" font-weight="900" fill="#3A2F12">$</text>
    </g>
  </g>

  <!-- duffel body: glossy black leather -->
  <rect x="102" y="204" width="308" height="178" rx="86" fill="url(#leather)"/>
  <!-- glossy highlight -->
  <path d="M136,232 Q256,196 376,232 L376,262 Q256,228 136,262 Z" fill="url(#gloss)"/>
  <!-- open zipper: gold teeth parted in the middle -->
  <path d="M128,236 Q186,214 226,210" fill="none" stroke="url(#goldShine)" stroke-width="6" stroke-linecap="round"/>
  <path d="M286,210 Q326,214 384,236" fill="none" stroke="url(#goldShine)" stroke-width="6" stroke-linecap="round"/>
  <!-- zipper pull hanging right -->
  <line x1="384" y1="236" x2="398" y2="258" stroke="url(#goldShine)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="402" cy="264" r="8" fill="none" stroke="url(#goldShine)" stroke-width="4.5"/>

  <!-- slim leather straps with gold buckles -->
  <rect x="172" y="204" width="16" height="178" rx="3" fill="#0C0B08"/>
  <rect x="324" y="204" width="16" height="178" rx="3" fill="#0C0B08"/>
  <rect x="168" y="278" width="24" height="18" rx="3" fill="url(#goldShine)"/>
  <rect x="320" y="278" width="24" height="18" rx="3" fill="url(#goldShine)"/>
  <rect x="173" y="283" width="14" height="8" rx="2" fill="#14120A"/>
  <rect x="325" y="283" width="14" height="8" rx="2" fill="#14120A"/>

  <!-- handles: black leather with gold clasp -->
  <path d="M182,214 C200,140 312,140 330,214" fill="none" stroke="#0C0B08" stroke-width="15" stroke-linecap="round"/>
  <path d="M182,214 C200,140 312,140 330,214" fill="none" stroke="#26231D" stroke-width="8" stroke-linecap="round"/>
  <rect x="240" y="150" width="32" height="24" rx="7" fill="url(#goldShine)"/>

  <!-- gold-rim sunglasses -->
  <g>
    <rect x="200" y="266" width="50" height="34" rx="12" fill="#060504" stroke="url(#goldShine)" stroke-width="3.5"/>
    <rect x="262" y="266" width="50" height="34" rx="12" fill="#060504" stroke="url(#goldShine)" stroke-width="3.5"/>
    <path d="M250,279 L262,279" stroke="url(#goldShine)" stroke-width="3.5"/>
    <path d="M209,274 L224,292" stroke="#F5E4AE" stroke-width="3" opacity="0.55" stroke-linecap="round"/>
    <path d="M271,274 L286,292" stroke="#F5E4AE" stroke-width="3" opacity="0.55" stroke-linecap="round"/>
  </g>

  <!-- gold $ charm -->
  <g>
    <circle cx="402" cy="296" r="23" fill="url(#goldShine)"/>
    <circle cx="402" cy="296" r="23" fill="none" stroke="#8A6A1B" stroke-width="2"/>
    <circle cx="402" cy="296" r="17" fill="none" stroke="#8A6A1B" stroke-width="1" opacity="0.6"/>
    <text x="402" y="307" text-anchor="middle" font-family="'Saira Stencil One','Arial Black',sans-serif" font-size="30" font-weight="700" fill="#14120A">$</text>
  </g>

  <!-- subtle BAGZ mark, embossed gold -->
  <text x="256" y="352" text-anchor="middle" font-family="'Saira Stencil One','Arial Black',sans-serif" font-size="27" letter-spacing="6" fill="url(#goldShine)" opacity="0.9">BAGZ</text>

  <!-- coins at the base -->
  <g>
    <ellipse cx="150" cy="392" rx="26" ry="9" fill="url(#goldShine)"/>
    <ellipse cx="150" cy="388" rx="26" ry="9" fill="#F0DCA0"/>
    <ellipse cx="368" cy="396" rx="22" ry="8" fill="url(#goldShine)"/>
    <ellipse cx="368" cy="392" rx="22" ry="8" fill="#F0DCA0"/>
    <ellipse cx="396" cy="404" rx="18" ry="7" fill="url(#goldShine)"/>
    <ellipse cx="396" cy="400" rx="18" ry="7" fill="#F0DCA0"/>
  </g>

  <!-- sparkles -->
  <g fill="#F5E4AE">
    <path d="M118,148 l4,12 12,4 -12,4 -4,12 -4,-12 -12,-4 12,-4 z" opacity="0.95"/>
    <path d="M396,128 l3,9 9,3 -9,3 -3,9 -3,-9 -9,-3 9,-3 z" opacity="0.75"/>
    <path d="M92,300 l2.5,8 8,2.5 -8,2.5 -2.5,8 -2.5,-8 -8,-2.5 8,-2.5 z" opacity="0.6"/>
  </g>
</svg>
